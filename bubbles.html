<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Bubble Popper — Continuum ABA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; touch-action: none; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #dbeafe 0%, #e0fdf4 35%, #fdf4ff 65%, #fff7ed 100%);
    }

    /* ── Bubble ── */
    .bubble {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid rgba(255,255,255,0.75);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      will-change: transform;
    }

    @keyframes bubble-float {
      0%, 100% { transform: translateY(0px)   scale(1);    }
      50%       { transform: translateY(-10px) scale(1.03); }
    }
    @keyframes bubble-grow {
      0%   { transform: scale(0);    opacity: 0; }
      65%  { transform: scale(1.14); opacity: 1; }
      100% { transform: scale(1);    opacity: 1; }
    }
    @keyframes bubble-pop {
      0%   { transform: scale(1);    opacity: 1; }
      40%  { transform: scale(1.4);  opacity: 0.9; }
      100% { transform: scale(0);    opacity: 0; }
    }
    @keyframes particle-fly {
      0%   { transform: translate(0, 0) scale(1); opacity: 1; }
      100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
    }
    @keyframes milestone-in {
      0%   { transform: translate(-50%,-50%) scale(0) rotate(-6deg); opacity: 0; }
      70%  { transform: translate(-50%,-50%) scale(1.1) rotate(2deg); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(1) rotate(0deg);  opacity: 1; }
    }
    @keyframes milestone-out {
      0%   { transform: translate(-50%,-50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%,-50%) scale(0); opacity: 0; }
    }

    /* ── Top bar ── */
    #top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(255,255,255,0.6);
      z-index: 10;
    }

    #field {
      position: fixed;
      top: 60px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.82rem;
      cursor: pointer;
      border: none;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }
    .btn:active { transform: scale(0.94); }
    .btn-back  { background: rgba(22,63,74,0.1);  color: #163f4a; }
    .btn-reset { background: rgba(58,190,202,0.15); color: #1d6d7d; }

    #pop-display {
      display: flex;
      flex-direction: column;
      align-items: center;
      line-height: 1;
    }
    #pop-count {
      font-size: 1.6rem;
      font-weight: 900;
      color: #163f4a;
      min-width: 2ch;
      text-align: center;
    }
    #pop-label {
      font-size: 0.65rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #3abeca;
    }
  </style>
</head>
<body>

  <!-- Top bar -->
  <div id="top-bar">
    <button class="btn btn-back" onclick="window.location.href='admin.html'">← Admin</button>

    <div id="pop-display">
      <span id="pop-count">0</span>
      <span id="pop-label">bubbles popped</span>
    </div>

    <button class="btn btn-reset" onclick="initBubbles()">↺ Reset</button>
  </div>

  <!-- Bubble field -->
  <div id="field"></div>

  <script>
    const COLORS = [
      { c1: 'rgba(58,190,202,0.6)',  c2: 'rgba(58,190,202,0.2)',  solid: '#3abeca' },
      { c1: 'rgba(99,102,241,0.6)',  c2: 'rgba(99,102,241,0.2)',  solid: '#6366f1' },
      { c1: 'rgba(236,72,153,0.6)',  c2: 'rgba(236,72,153,0.2)',  solid: '#ec4899' },
      { c1: 'rgba(249,115,22,0.6)',  c2: 'rgba(249,115,22,0.2)',  solid: '#f97316' },
      { c1: 'rgba(34,197,94,0.6)',   c2: 'rgba(34,197,94,0.2)',   solid: '#22c55e' },
      { c1: 'rgba(234,179,8,0.6)',   c2: 'rgba(234,179,8,0.2)',   solid: '#eab308' },
      { c1: 'rgba(239,68,68,0.6)',   c2: 'rgba(239,68,68,0.2)',   solid: '#ef4444' },
      { c1: 'rgba(168,85,247,0.6)',  c2: 'rgba(168,85,247,0.2)',  solid: '#a855f7' },
      { c1: 'rgba(20,184,166,0.6)',  c2: 'rgba(20,184,166,0.2)',  solid: '#14b8a6' },
    ];

    let popCount = 0;
    let audioCtx  = null;

    function getAudioCtx() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }

    function playPop(size) {
      try {
        const ctx  = getAudioCtx();
        const osc  = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        const freq = Math.max(180, 700 - size * 6);
        osc.frequency.setValueAtTime(freq, ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(freq * 0.28, ctx.currentTime + 0.13);
        gain.gain.setValueAtTime(0.28, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.16);
        osc.type = 'sine';
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.17);
      } catch(_) {}
    }

    function spawnParticles(x, y, color) {
      const field = document.getElementById('field');
      const n = 8;
      for (let i = 0; i < n; i++) {
        const angle = (i / n) * Math.PI * 2;
        const dist  = 28 + Math.random() * 28;
        const p = document.createElement('div');
        p.style.cssText = [
          'position:absolute',
          `left:${x}px`, `top:${y}px`,
          `width:${6 + Math.random() * 5}px`,
          `height:${6 + Math.random() * 5}px`,
          'border-radius:50%',
          `background:${color}`,
          'pointer-events:none',
          'transform:translate(-50%,-50%)',
          `--dx:${(Math.cos(angle) * dist).toFixed(1)}px`,
          `--dy:${(Math.sin(angle) * dist).toFixed(1)}px`,
          'animation:particle-fly 0.5s ease-out forwards',
        ].join(';');
        field.appendChild(p);
        setTimeout(() => p.remove(), 550);
      }
    }

    function makeBubble(x, y, size, col, delayMs) {
      const field = document.getElementById('field');
      const el    = document.createElement('div');
      el.className = 'bubble';

      const floatDur   = (2.4 + Math.random() * 2.2).toFixed(2);
      const floatDelay = (Math.random() * 3).toFixed(2);

      el.style.cssText = [
        `left:${x}px`, `top:${y}px`,
        `width:${size}px`, `height:${size}px`,
        `background:radial-gradient(circle at 33% 30%, rgba(255,255,255,0.78) 0%, ${col.c1} 55%, ${col.c2} 100%)`,
        `box-shadow:inset -3px -3px 8px rgba(0,0,0,0.07), 0 4px 16px ${col.c2}`,
        `animation:bubble-grow 0.55s cubic-bezier(0.34,1.56,0.64,1) ${delayMs}ms both, bubble-float ${floatDur}s ease-in-out ${floatDelay}s infinite`,
      ].join(';');

      el.addEventListener('pointerdown', function(e) {
        e.preventDefault();
        if (el.dataset.popped) return;
        el.dataset.popped = '1';

        playPop(size);
        spawnParticles(x + size / 2, y + size / 2, col.solid);

        el.style.animation = 'bubble-pop 0.28s cubic-bezier(0.34,1.56,0.64,1) forwards';

        popCount++;
        document.getElementById('pop-count').textContent = popCount;

        const milestones = { 10:'🎉', 25:'⭐', 50:'🏆', 75:'🌈', 100:'🦄', 150:'🔥', 200:'👑' };
        if (milestones[popCount]) showMilestone(popCount, milestones[popCount]);

        const regrowDelay = 700 + Math.random() * 600;
        setTimeout(() => {
          el.style.animation = [
            'bubble-grow 0.55s cubic-bezier(0.34,1.56,0.64,1) both',
            `bubble-float ${floatDur}s ease-in-out ${floatDelay}s infinite`,
          ].join(', ');
          delete el.dataset.popped;
        }, regrowDelay);
      });

      field.appendChild(el);
    }

    function initBubbles() {
      popCount = 0;
      document.getElementById('pop-count').textContent = '0';
      const field = document.getElementById('field');
      field.innerHTML = '';

      const W = field.offsetWidth;
      const H = field.offsetHeight;
      const cell = window.innerWidth < 500 ? 70 : 85;
      const cols = Math.max(3, Math.floor(W / cell));
      const rows = Math.max(3, Math.floor(H / cell));
      const cW   = W / cols;
      const cH   = H / rows;

      let i = 0;
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const size = 22 + Math.floor(Math.random() * 40);
          const pad  = 6;
          const x    = c * cW + pad + Math.random() * Math.max(0, cW - size - pad * 2);
          const y    = r * cH + pad + Math.random() * Math.max(0, cH - size - pad * 2);
          const col  = COLORS[Math.floor(Math.random() * COLORS.length)];
          makeBubble(x, y, size, col, i * 25);
          i++;
        }
      }
    }

    function showMilestone(n, emoji) {
      const field = document.getElementById('field');
      const el    = document.createElement('div');
      el.style.cssText = [
        'position:absolute', 'top:50%', 'left:50%',
        'transform:translate(-50%,-50%) scale(0)',
        'background:white', 'border-radius:24px',
        'padding:20px 36px', 'text-align:center',
        'font-weight:900', 'font-size:2rem', 'color:#163f4a',
        'pointer-events:none', 'z-index:20',
        'box-shadow:0 12px 40px rgba(0,0,0,0.18)',
        'animation:milestone-in 0.45s cubic-bezier(0.34,1.56,0.64,1) forwards',
      ].join(';');
      el.innerHTML = `<div style="font-size:3rem;margin-bottom:6px">${emoji}</div>${n} pops!`;
      field.appendChild(el);
      setTimeout(() => {
        el.style.animation = 'milestone-out 0.3s ease forwards';
        setTimeout(() => el.remove(), 350);
      }, 1800);
    }

    // Init on load and resize
    window.addEventListener('load', initBubbles);
    window.addEventListener('resize', () => {
      clearTimeout(window._resizeTimer);
      window._resizeTimer = setTimeout(initBubbles, 250);
    });
  </script>
</body>
</html>
